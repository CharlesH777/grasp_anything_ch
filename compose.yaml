name: grasp-anything

services:
  grasp-anything:
    build:
      context: .
    image: grasp-anything:0.1.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HF_HOME: /models/huggingface
    ports:
      - "${LOCATE_PORT:-8000}:8000"
    volumes:
      - huggingface-cache:/models/huggingface
    shm_size: "8gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  huggingface-cache:
